name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t net-checkin-tests .

      - name: Run tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            net-checkin-tests

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Trigger n2vlv rebuild
        if: success()
        env:
          GH_TOKEN: ${{ secrets.N2VLV_DISPATCH_TOKEN }}
        run: gh api repos/jchonig/n2vlv/dispatches -f event_type=net-checkin-updated
